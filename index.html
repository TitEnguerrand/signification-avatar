let currentLang = 'fr';
let history = [];
let busy = false;

function setLang(lang) {
  currentLang = lang;
  document.getElementById('langFr').className = lang === 'fr' ? 'active' : '';
  document.getElementById('langEn').className = lang === 'en' ? 'active' : '';
  document.getElementById('langEs').className = lang === 'es' ? 'active' : '';
  document.getElementById('langDe').className = lang === 'de' ? 'active' : '';
  document.getElementById('title1').textContent = TEXTS[lang].title1;
  document.getElementById('title2').textContent = TEXTS[lang].title2;
  document.getElementById('subtitle').innerHTML = TEXTS[lang].subtitle;
  document.getElementById('welcomeInput').placeholder = TEXTS[lang].placeholder;
  document.getElementById('chatInput').placeholder = TEXTS[lang].placeholder;
  document.getElementById('chatNote').textContent = TEXTS[lang].note;
  var backBtn = document.getElementById('backBtn');
  if (backBtn) {
    backBtn.setAttribute('title', TEXTS[lang].backTooltip);
    backBtn.setAttribute('aria-label', TEXTS[lang].backTooltip);
  }
  var titleBlock = document.querySelector('.header-title-block');
  if (titleBlock) {
    titleBlock.setAttribute('title', TEXTS[lang].backTooltip);
  }
  buildSuggestions();
}

function buildSuggestions() {
  const sugDiv = document.getElementById('suggestions');
  sugDiv.innerHTML = '';
  const questions = {fr: QUESTIONS_FR, en: QUESTIONS_EN, es: QUESTIONS_ES, de: QUESTIONS_DE}[currentLang];
  const lastIndex = questions.length - 1;
  questions.forEach((q, index) => {
    const btn = document.createElement('button');
    btn.innerHTML = q;
    if (index === lastIndex) {
      // Dernier bouton : Note méthodologique
      btn.classList.add('methodological');
      btn.onclick = () => showMethodologicalNote();
    } else {
      btn.onclick = () => {
        const plainText = q.replace(/<\/?em>/g, '');
        send(plainText);
      };
    }
    sugDiv.appendChild(btn);
  });
}

function showMethodologicalNote() {
  // Bascule vers la vue chat et affiche la note méthodologique
  // dans la langue courante, sans appel API
  if (!document.getElementById('chat').classList.contains('active')) {
    switchToChat();
  }
  const noteLabel = {fr: "Note méthodologique", en: "Methodological note", es: "Nota metodológica", de: "Methodologische Anmerkung"}[currentLang];
  addMessage('user', noteLabel);
  const noteText = METHODOLOGICAL_NOTES[currentLang];

  // Affiche la note directement (sans appel API, sans streaming)
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.style.animation = 'msgIn 0.3s ease-out';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(noteText);
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  if (lastUserMsg) {
    lastUserMsg.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Initial build
setLang('fr');

// Detect language from URL parameter
var urlParams = new URLSearchParams(window.location.search);
var langParam = urlParams.get('lang');
if (langParam && ['fr','en','es','de'].indexOf(langParam) >= 0) {
  setLang(langParam);
}

// Input handling
const wInput = document.getElementById('welcomeInput');
const wBtn = document.getElementById('welcomeBtn');
const cInput = document.getElementById('chatInput');
const cBtn = document.getElementById('chatBtn');

wInput.addEventListener('input', () => { wBtn.disabled = !wInput.value.trim(); });
wInput.addEventListener('keydown', e => { if (e.key === 'Enter' && wInput.value.trim()) send(wInput.value); });
wBtn.addEventListener('click', () => { if (wInput.value.trim()) send(wInput.value); });

cInput.addEventListener('input', () => { cBtn.disabled = !cInput.value.trim(); });
cInput.addEventListener('keydown', e => { if (e.key === 'Enter' && cInput.value.trim()) send(cInput.value); });
cBtn.addEventListener('click', () => { if (cInput.value.trim()) send(cInput.value); });

function switchToChat() {
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('chat').classList.add('active');
  cInput.focus();
}

function backToHome() {
  document.getElementById('chat').classList.remove('active');
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('messages').innerHTML = '';
  history = [];
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let lastUserMsg = null;

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(text);
  } else {
    bubble.textContent = text;
    lastUserMsg = wrapper;
  }

  wrapper.appendChild(bubble);
  container.appendChild(wrapper);

  if (role === 'user') {
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else if (lastUserMsg) {
    lastUserMsg.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing';
  div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  container.appendChild(div);
  if (lastUserMsg) {
    lastUserMsg.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function renderMarkdown(text) {
  return text
    .split('\n')
    .map(line => {
      if (line.startsWith('### ')) return '<h4>' + line.slice(4) + '</h4>';
      if (line.startsWith('## ')) return '<h3>' + line.slice(3) + '</h3>';
      if (line.match(/^[-*] /)) return '<li>' + line.slice(2) + '</li>';
      if (line.match(/^\d+\.\s/)) return '<li>' + line.replace(/^\d+\.\s/, '') + '</li>';
      if (!line.trim()) return '<br>';
      return '<p>' + line + '</p>';
    })
    .join('')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/(<li>.*?<\/li>)+/g, '<ul>$&</ul>');
}

async function send(text) {
  const msg = text.trim();
  if (!msg || busy) return;
  busy = true;

  var tempInput = document.createElement('input');
  tempInput.setAttribute('type', 'text');
  tempInput.setAttribute('readonly', 'readonly');
  tempInput.style.position = 'absolute';
  tempInput.style.opacity = '0';
  tempInput.style.height = '0';
  document.body.appendChild(tempInput);
  tempInput.focus();
  tempInput.blur();
  document.body.removeChild(tempInput);

  wInput.blur();
  cInput.blur();
  document.activeElement.blur();

  if (!document.getElementById('chat').classList.contains('active')) {
    switchToChat();
  }

  addMessage('user', msg);
  wInput.value = '';
  cInput.value = '';
  cBtn.disabled = true;

  history.push({ role: 'user', content: msg });

  setTimeout(function() {
    showTyping();
    if (lastUserMsg) lastUserMsg.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 350);

  var container = document.getElementById('messages');
  var wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.style.animation = 'msgIn 0.3s ease-out';
  wrapper.style.display = 'none';
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);

  var fullText = '';
  var lastIndex = 0;

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/chat');
  xhr.setRequestHeader('Content-Type', 'application/json');

  xhr.onprogress = function() {
    var newData = xhr.responseText.substring(lastIndex);
    lastIndex = xhr.responseText.length;

    var lines = newData.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.startsWith('data: ') && line !== 'data: [DONE]') {
        try {
          var event = JSON.parse(line.substring(6));
          if (event.text) {
            if (fullText === '') {
              hideTyping();
              wrapper.style.display = '';
              if (lastUserMsg) lastUserMsg.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            fullText += event.text;
            bubble.innerHTML = renderMarkdown(fullText);
          }
        } catch (e) {}
      }
    }
  };

  xhr.onload = function() {
    hideTyping();
    if (fullText === '') {
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.error) {
          wrapper.style.display = '';
          bubble.textContent = '⚠️ ' + data.error;
          fullText = data.error;
        } else if (data.text) {
          wrapper.style.display = '';
          fullText = data.text;
          bubble.innerHTML = renderMarkdown(fullText);
        }
      } catch (e) {
        var lines = xhr.responseText.split('\n');
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            try {
              var event = JSON.parse(line.substring(6));
              if (event.text) fullText += event.text;
            } catch (e2) {}
          }
        }
        if (fullText) {
          wrapper.style.display = '';
          bubble.innerHTML = renderMarkdown(fullText);
        }
      }
    }
    if (fullText) {
      var linkLang = { fr: 'Acces aux articles et aux livres', en: 'Access articles and books', es: 'Acceso a articulos y libros', de: 'Zugang zu Artikeln und Buechern' };
      var linkText = linkLang[currentLang] || linkLang.fr;
      bubble.innerHTML += '<p style="margin-top:1.5em;font-size:0.85em;"><a href="https://philarchive.org/s?utf8=%E2%9C%93&searchStr=Geoffroy+de+Clisson" target="_blank" style="color:#8b7355;">' + linkText + ' &rarr;</a></p>';
    }
    if (fullText) history.push({ role: 'assistant', content: fullText });
    if (lastUserMsg) lastUserMsg.scrollIntoView({ behavior: 'smooth', block: 'start' });
    busy = false;
    cInput.focus();
  };

  xhr.onerror = function() {
    hideTyping();
    wrapper.style.display = '';
    bubble.textContent = '⚠️ Erreur de connexion.';
    busy = false;
    cInput.focus();
  };

  xhr.send(JSON.stringify({ messages: history }));
}
